<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Expenses - WAYAKI</title>
  <link rel="stylesheet" href="css/profit.css">
</head>

<body>

<header>
  <h1>All Expenses 🧾</h1>

  <button class="back-btn" onclick="window.location.href='profit.html'">
    ← Back
  </button>
</header>

<main>
  <section class="card">
    <div class="filter-bar">
      <label>
        Select Month
        <input type="month" id="expenseMonth" onchange="filterExpenses()">
      </label>

      <button class="filterBtn" onclick="showAllExpenses()">
        Reset Filters
      </button>
    </div>
    
    <div class="tag-filter-group">
      <button class="tag-filter active" onclick="setTagFilter('', event)">All</button>
      <button class="tag-filter" onclick="setTagFilter('others', event)">Others</button>
    </div>

    <div class="filter-grid">
      <div class="filter-card">
        <h4>Salmon Deluxe</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('salmon', event)">Salmon</button>
          <button class="tag-filter" onclick="setTagFilter('crabstick', event)">Crabstick</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Shroom Bliss</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('kingoyster', event)">King Oyster</button>
          <button class="tag-filter" onclick="setTagFilter('buttonmushroom', event)">Button</button>
          <button class="tag-filter" onclick="setTagFilter('corn', event)">Corn</button>
          <button class="tag-filter" onclick="setTagFilter('truffle', event)">Truffle</button>
          <button class="tag-filter" onclick="setTagFilter('mozzarella', event)">Mozzarella</button>
          <button class="tag-filter" onclick="setTagFilter('butter', event)">Butter</button>
          <button class="tag-filter" onclick="setTagFilter('cookingcream', event)">Cooking Cream</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Chicken Comfort / Luncheon Melt</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('chicken', event)">Chicken</button>
          <button class="tag-filter" onclick="setTagFilter('egg', event)">Egg</button>
          <button class="tag-filter" onclick="setTagFilter('luncheon', event)">Luncheon</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Tuna Delight</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('tuna', event)">Tuna</button>
          <button class="tag-filter" onclick="setTagFilter('cucumber', event)">Cucumber</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Sauces / Others</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('mayo', event)">Mayo</button>
          <button class="tag-filter" onclick="setTagFilter('soysauce', event)">Soy Sauce</button>
          <button class="tag-filter" onclick="setTagFilter('teriyaki', event)">Teriyaki</button>
          <button class="tag-filter" onclick="setTagFilter('mentaiko', event)">Mentaiko</button>
          <button class="tag-filter" onclick="setTagFilter('creamcheese', event)">Cream Cheese</button>
          <button class="tag-filter" onclick="setTagFilter('cookingoil', event)">Cooking Oil</button>
          <button class="tag-filter" onclick="setTagFilter('sesameoil', event)">Sesame Oil</button>
          <button class="tag-filter" onclick="setTagFilter('flour', event)">Flour</button>
          <button class="tag-filter" onclick="setTagFilter('blackpepper', event)">Black Pepper</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Rice</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('rice', event)">Rice</button>
          <button class="tag-filter" onclick="setTagFilter('vinegar', event)">Rice Vinegar</button>
          <button class="tag-filter" onclick="setTagFilter('sugar', event)">Sugar</button>
          <button class="tag-filter" onclick="setTagFilter('salt', event)">Salt</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Packaging</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('tray', event)">Tray</button>
          <button class="tag-filter" onclick="setTagFilter('seaweed', event)">Seaweed</button>
          <button class="tag-filter" onclick="setTagFilter('tea', event)">Tea</button>
          <button class="tag-filter" onclick="setTagFilter('thermalbag', event)">Thermal Bag</button>
          <button class="tag-filter" onclick="setTagFilter('logosticker', event)">Logo Sticker</button>
          <button class="tag-filter" onclick="setTagFilter('namestickertray', event)">Name Sticker / Tray</button>
          <button class="tag-filter" onclick="setTagFilter('receiptstickerbag', event)">Receipt Sticker / Bag</button>
          <button class="tag-filter" onclick="setTagFilter('spoon', event)">Disposable Spoon</button>
        </div>
      </div>
      <div class="filter-card">
        <h4>Upgrade Set</h4>
        <div class="tag-filter-group">
          <button class="tag-filter" onclick="setTagFilter('edamame', event)">Edamame</button>
          <button class="tag-filter" onclick="setTagFilter('yuzu', event)">Yuzu</button>
          <button class="tag-filter" onclick="setTagFilter('bottle', event)">Bottle</button>
          <button class="tag-filter" onclick="setTagFilter('bottlesticker', event)">Bottle Sticker</button>
        </div>
      </div>
    </div>
    <div id="allExpenseList"></div>
  </section>
</main>

<!-- Edit Popup -->
<div id="editModal" class="modal-backdrop hidden">
  <div class="edit-modal">
    <h2>Edit Expense ✏️</h2>

    <label>
      Date
      <input type="date" id="editDate">
    </label>

    <label>
      Tag
      <select id="editTag">
        <option value="salmon">Salmon</option>
        <option value="crabstick">Crabstick</option>
        <option value="kingoyster">King Oyster Mushroom</option>
        <option value="buttonmushroom">Button Mushroom</option>
        <option value="corn">Corn</option>
        <option value="truffle">Truffle</option>
        <option value="mozzarella">Mozzarella</option>
        <option value="butter">Butter</option>
        <option value="cookingcream">Cooking Cream</option>
        <option value="chicken">Chicken</option>
        <option value="luncheon">Luncheon Meat</option>
        <option value="egg">Egg</option>
        <option value="tuna">Tuna</option>
        <option value="cucumber">Cucumber</option>
        <option value="mayo">Mayo</option>
        <option value="soysauce">Soy Sauce</option>
        <option value="teriyaki">Teriyaki</option>
        <option value="mentaiko">Mentaiko</option>
        <option value="rice">Rice</option>
        <option value="vinegar">Rice Vinegar</option>
        <option value="sugar">Sugar</option>
        <option value="salt">Salt</option>
        <option value="creamcheese">Cream Cheese</option>
        <option value="cookingoil">Cooking Oil</option>
        <option value="sesameoil">Sesame Oil</option>
        <option value="flour">Flour</option>
        <option value="blackpepper">Black Pepper</option>
        <option value="edamame">Edamame</option>
        <option value="yuzu">Yuzu</option>
        <option value="bottle">Bottle</option>
        <option value="bottlesticker">Bottle Sticker</option>
        <option value="tray">Tray</option>
        <option value="seaweed">Seaweed</option>
        <option value="tea">Tea</option>
        <option value="thermalbag">Thermal Bag</option>
        <option value="logosticker">Logo Sticker</option>
        <option value="namestickertray">Name Sticker / Tray</option>
        <option value="receiptstickerbag">Receipt Sticker / Bag</option>
        <option value="spoon">Disposable Spoon</option>
        <option value="others">Others</option>
      </select>
    </label>

    <label>
      Item Name
      <input type="text" id="editName">
    </label>

    <label>
      Total Cost ($)
      <input type="number" id="editCost" step="0.01">
    </label>

    <label>
      Total Amount
      <input type="number" id="editAmount" step="0.01">
    </label>

    <label>
      Unit
      <select id="editUnit">
        <option value="g">g</option>
        <option value="ml">ml</option>
        <option value="pcs">pcs</option>
      </select>
    </label>

    <div class="modal-actions">
      <button class="filter-btn" onclick="saveEditedExpense()">Save</button>
      <button class="back-btn" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- JavaScript -->
<script src="js/expenses.js"></script>

</body>
</html>
