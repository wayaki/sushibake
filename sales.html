<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Sales - WAYAKI</title>
  <link rel="stylesheet" href="css/profit.css">
</head>

<body>

<header>
    <h1>All Sales 🍣</h1>

    <button class="back-btn" onclick="window.location.href='profit.html'">
        ← Back
    </button>
</header>

<main>
    <section class="card">
    <h2>Filter Sales</h2>

    <div class="filter-bar">
      <label>
        Select Month
        <input type="month" id="salesMonth" onchange="filterSalesByMonth()">
      </label>

      <button class="filterBtn" onclick="showAllSales()">
        Reset Filters
      </button>
    </div>

    <div id="allSalesList"></div>
    </section>
</main>

<div id="editSaleModal" class="modal-backdrop hidden">
  <div class="edit-modal">
    <h2>Edit Sale ✏️</h2>

    <label>
      Customer Name
      <input type="text" id="editCustomerName">
    </label>

    <label>
      Order Date
      <input type="date" id="editSaleDate">
    </label>
    <div class="edit-row">
        <label>Trio Qty
            <input type="number" id="editQtyTrio" min="0">
        </label>

        <label>Trio Price
            <input type="number" id="editPriceTrio" step="0.01">
        </label>
    </div>

    <div class="trio-breakdown">
        <div class="trio-item">
            <label>🍣 Salmon</label>
            <input type="number" id="editTrioSalmon" min="0" value="0">
        </div>

        <div class="trio-item">
            <label>🍄 Shroom</label>
            <input type="number" id="editTrioShroom" min="0" value="0">
        </div>

        <div class="trio-item">
            <label>🍗 Chicken</label>
            <input type="number" id="editTrioChicken" min="0" value="0">
        </div>

        <div class="trio-item">
            <label>🐟 Tuna</label>
            <input type="number" id="editTrioTuna" min="0" value="0">
        </div>
    </div>

    <div class="edit-row">
        <label>Salmon Qty <input type="number" id="editQtySalmon" min="0"></label>
        <label>Salmon Price <input type="number" id="editPriceSalmon" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Shroom Qty <input type="number" id="editQtyShroom" min="0"></label>
        <label>Shroom Price <input type="number" id="editPriceShroom" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Chicken Qty <input type="number" id="editQtyChicken" min="0"></label>
        <label>Chicken Price <input type="number" id="editPriceChicken" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Tuna Qty <input type="number" id="editQtyTuna" min="0"></label>
        <label>Tuna Price <input type="number" id="editPriceTuna" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Luncheon Qty <input type="number" id="editQtyLuncheon" min="0"></label>
        <label>Luncheon Price <input type="number" id="editPriceLuncheon" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Upgrade Qty <input type="number" id="editQtyUpgrade" min="0"></label>
        <label>Upgrade Price <input type="number" id="editPriceUpgrade" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Seaweed Qty <input type="number" id="editQtySeaweed" min="0"></label>
        <label>Seaweed Price <input type="number" id="editPriceSeaweed" step="0.01"></label>
    </div>
    <div class="edit-row">
        <label>Tea Qty <input type="number" id="editQtyTea" min="0"></label>
        <label>Tea Price <input type="number" id="editPriceTea" step="0.01"></label>
    </div>
    <label>
      Collection Method
      <select id="editMethod" onchange="toggleEditDeliveryFields()">
        <option value="self">Self Collect</option>
        <option value="delivery">Delivery</option>
      </select>
    </label>

    <div id="editDeliveryFields">

        <label>
            Customer Paid Delivery ($)
            <input type="number" id="editCustomerDeliveryPaid" step="0.01">
        </label>

        <label>
            You Paid Driver ($)
            <input type="number" id="editDriverPaid" step="0.01">
        </label>

    </div>

    <div class="modal-actions">
      <button class="filter-btn" onclick="saveEditedSale()">Save</button>
      <button class="back-btn" onclick="closeEditSaleModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- JavaScript -->
<script src="js/sales.js"></script>

</body>
</html>
