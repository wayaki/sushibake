<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAYAKI Giveaway Picker</title>

  <link rel="stylesheet" href="spinner-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
</head>

<body>
  <div class="top-upload">
    <input type="file" id="fileInput" accept=".txt,.csv" />
    <div class="count" id="entryCount">No file uploaded yet</div>
  </div>
  
  <div class="container">
    <h1>BOSS TREAT</h1>
    <p class="subtitle">Giveaway Winner Picker</p>
    <button id="spinBtn">Pick Winner 🎉</button>

    <div class="card-area">
      <div class="spin-card small" id="name1">@wayaki</div>
      <div class="spin-card small" id="name2">@sushibake</div>
      <div class="spin-card small" id="name3">@boss_treat</div>

      <div class="spin-card winner" id="mainName">Upload entries first</div>

      <div class="spin-card small" id="name4">@free_tray</div>
      <div class="spin-card small" id="name5">@free_delivery</div>
      <div class="spin-card small" id="name6">🍣</div>
    </div>

    <div class="winner-box" id="winnerBox"></div>

    <p class="note">
      duplicates = extra chances ✨<br />
      screen record for IG story 😗
    </p>
  </div>
  
  <div class="overlay" id="overlay"></div>

  <script>
    let entries = [];


    const fileInput = document.getElementById("fileInput");
    const entryCount = document.getElementById("entryCount");
    const spinBtn = document.getElementById("spinBtn");
    const overlay = document.getElementById("overlay");
    const winnerBox = document.getElementById("winnerBox");
    const mainName = document.getElementById("mainName");

    const nameSlots = [
      document.getElementById("name1"),
      document.getElementById("name2"),
      document.getElementById("name3"),
      document.getElementById("name4"),
      document.getElementById("name5"),
      document.getElementById("name6")
    ];

    // rolling queue
    let rollingNames = [];

    fileInput.addEventListener("change", function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        const text = e.target.result;

        entries = text
          .split(/\r?\n|,/)
          .map(name => name.trim())
          .filter(name => name !== "")
          .filter(name => name.toLowerCase() !== "username");

        entryCount.textContent = `${entries.length} entries loaded 🍣`;

        winnerBox.style.display = "none";

        setupRollingNames();
      };

      reader.readAsText(file);
    });

    function randomUser() {
      return entries[Math.floor(Math.random() * entries.length)];
    }

    function setupRollingNames() {
      rollingNames = [];

      for (let i = 0; i < 7; i++) {
        rollingNames.push(randomUser());
      }

      renderRollingNames();
    }

    function renderRollingNames() {
      nameSlots[0].textContent = rollingNames[0];
      nameSlots[1].textContent = rollingNames[1];
      nameSlots[2].textContent = rollingNames[2];

      mainName.textContent = rollingNames[3];

      nameSlots[3].textContent = rollingNames[4];
      nameSlots[4].textContent = rollingNames[5];
      nameSlots[5].textContent = rollingNames[6];
    }

    // THIS creates the moving-down effect
    function updateFixedCards(finalWinner = null) {

      // remove bottom
      rollingNames.pop();

      // add new name to top
      rollingNames.unshift(randomUser());

      // force winner into middle at end
      if (finalWinner) {
        rollingNames[3] = finalWinner;
      }

      renderRollingNames();
    }

    function pickWinnerSecurely() {
      const eligibleEntries = entries.filter(name =>
        !excludedWinners.includes(name.toLowerCase())
      );

      if (eligibleEntries.length === 0) {
        alert("No eligible winners left 😭");
        return null;
      }

      if (window.crypto && window.crypto.getRandomValues) {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return eligibleEntries[array[0] % eligibleEntries.length];
      }

      return eligibleEntries[Math.floor(Math.random() * eligibleEntries.length)];
    }

    spinBtn.addEventListener("click", startSpin);

    function startSpin() {
      if (entries.length === 0) {
        alert("Upload a TXT or CSV file first 😗");
        return;
      }

      if (rollingNames.length === 0) {
        setupRollingNames();
      }

      spinBtn.disabled = true;
      winnerBox.style.display = "none";

      let spins = 0;

      const minimumSpins = Math.ceil(entries.length * 1.02);

      function isEligible(name) {
        return !excludedWinners.includes(name.toLowerCase());
      }

      function spinStep() {
        updateFixedCards();
        spins++;

        const currentCenterName = rollingNames[3];

        let speed = 45;

        if (spins >= minimumSpins) {
          const extraSpins = spins - minimumSpins;

          if (extraSpins < 1) {
            speed = 80;
          } else {
            speed = 220;
          }

          if (isEligible(currentCenterName) && extraSpins >= 10) {
            overlay.style.display = "block";
            winnerBox.style.display = "block";
            winnerBox.innerHTML = `🎉 WINNER:<br>${currentCenterName}`;

            spinBtn.disabled = false;
            return;
          }
        }

        setTimeout(spinStep, speed);
      }

      spinStep();
    }
  </script>
</body>
</html>
