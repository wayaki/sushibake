<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WAYAKI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

  <header>
    <img src="images/logo.png" alt="WAYAKI Logo">
  </header>

  <div class="menu-container">

    <!-- ITEM 1 -->
    <div class="menu-item">
      <img src="images/salmon-crabstick.png" alt="Salmon Deluxe" onclick="openModal(this)">

      <div class="item-info">
        <div class="item-name">Salmon Deluxe</div>
        <div class="item-desc"></div>
        <div class="item-price">$12.90</div>

        <div class="quantity">
          <button onclick="changeQty('salmon', -1)">-</button>
          <span id="qty-salmon">0</span>
          <button onclick="changeQty('salmon', 1)">+</button>
        </div>
      </div>
    </div>

    <!-- ITEM 2 -->
    <div class="menu-item">
      <img src="images/teriyaki-chicken.png" alt="Chicken Comfort" onclick="openModal(this)">

      <div class="item-info">
        <div class="item-name">Chicken Comfort</div>
        <div class="item-desc">Creamy tuna mixed with cool cucumber for a smooth, comforting bite</div>
        <div class="item-price">$10.90</div>

        <div class="quantity">
          <button onclick="changeQty('tuna', -1)">-</button>
          <span id="qty-tuna">0</span>
          <button onclick="changeQty('tuna', 1)">+</button>
        </div>
      </div>
    </div>

    <!-- ITEM 3 -->
    <div class="menu-item">
      <img src="images/tuna-cucumber.png" alt="Tuna Delight" onclick="openModal(this)">

      <div class="item-info">
        <div class="item-name">Tuna Delight</div>
        <div class="item-desc">Soft-boiled egg blended with cucumber for a gentle, cozy, melt-in-your-mouth treat</div>
        <div class="item-price">$9.90</div>

        <div class="quantity">
          <button onclick="changeQty('chicken', -1)">-</button>
          <span id="qty-chicken">0</span>
          <button onclick="changeQty('chicken', 1)">+</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Image Modal -->
  <div id="imageModal" class="image-modal">
    <span class="close-btn" onclick="closeModal()">×</span>
    <img class="modal-content" id="modalImg">
  </div>

  <button class="cart-btn" onclick="goToCart()">Your Cart</button>

  <footer>
    © 2026 WAYAKI Singapore
  </footer>
  
  <!-- JavaScript -->
  <script>
    const cart = {
      salmon: { qty: 0, price: 10.9 },
      tuna: { qty: 0, price: 9.9 },
      chicken: { qty: 0, price: 8.9 }
    };
  
    const displayNames = {
      salmon: "Salmon Deluxe",
      tuna: "Tuna Delight",
      chicken: "Chicken Comfort"
    };
  
    function changeQty(item, delta) {
      const newQty = cart[item].qty + delta;
      if (newQty >= 0) {
        cart[item].qty = newQty;
        document.getElementById(`qty-${item}`).textContent = newQty;
      }
    }
  
    function goToCart() {
      localStorage.setItem("sushibakeCart", JSON.stringify(cart));
      window.location.href = "cart.html";
    }
  
    // Load saved cart
    const savedCart = JSON.parse(localStorage.getItem("sushibakeCart")) || {};
    for (const item in savedCart) {
      if (cart[item]) {
        cart[item].qty = savedCart[item].qty;
        document.getElementById(`qty-${item}`).textContent = cart[item].qty;
      }
    }

    // Image Function
    function openModal(img) {
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImg");

      modal.style.display = "block";
      modalImg.src = img.src;
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";    
      window.onclick = function(event) {
        const modal = document.getElementById("imageModal");
        if (event.target === modal) {
          modal.style.display = "none";
        }
      };
    }


  </script>


</body>
</html>
