<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WAYAKI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
  <link href="stylesheet.css" rel="stylesheet">
</head>
<body>

  <header>
    <img src="images/your-cart.png" alt="WAYAKI Logo">
  </header>

  <div class="cart-container">
    <button id="back-btn" onclick="window.location.href='index.html'">Back to Menu</button>

    <h2>Order Details</h2>
    <ul id="cart-list"></ul>



    <div class="checkout-section">
          <h2>Order Schedule</h2>
    <label>
      Select Order Date
      <select id="order-date" required>
        <option value="">Select a date</option>
      </select>
    </label>
    
      <h2>Customer Details</h2>

      <label>
        Full Name
        <input type="text" id="name" placeholder="e.g. Charlie" required>
      </label>

      <label>
        Phone Number
        <input type="tel" id="phone" placeholder="e.g. 9123 4567" required>
      </label>

      <h2>Collection Method</h2>
      <div class="collect-methods">
        <label class="radio">
          <input type="radio" name="method" value="self" checked onchange="toggleDelivery()">
          Self Collect (Free)
        </label>

        <div id="self-options" style="display:block;">
          <div class="pickup-box">
            <div class="pickup-title">Pick-up Location</div>
              <div class="pickup-value">
                <span id="pickup-location">Woodlands, Singapore 730877</span><br>
                <small>Exact unit number will be shared via WhatsApp after ordering.</small>
              </div>
          </div>

          <label>
            Preferred Pick-up Time
            <select id="pickup-time">
              <option value="">Select time</option>
              <option value="12:00 - 13:00">12:00 - 13:00</option>
              <option value="13:00 - 14:00">13:00 - 14:00</option>
              <option value="14:00 - 15:00">14:00 - 15:00</option>
              <option value="15:00 - 16:00">15:00 - 16:00</option>
              <option value="16:00 - 17:00">16:00 - 17:00</option>
            </select>
          </label>
        </div>
      </div>

      <div class="collect-methods">
        <label class="radio">
          <input type="radio" name="method" value="delivery" onchange="toggleDelivery()">
          Delivery
        </label>

        <div id="delivery-options" style="display:none;">
          <label>
            Delivery Area
            <select id="area" onchange="updateTotal()" disabled>
              <option value="">Select area</option>
              <option value="north">North (+$8)</option>
              <option value="west">West / North East (+$12)</option>
              <option value="south">Central / East (+$15)</option>
            </select>
          </label>

          <label>
            Address
            <input type="text" id="address" placeholder="Block / Street Name" disabled>
          </label>

          <label>
            Postal Code
            <input type="text" id="postal" placeholder="e.g. 560123" disabled>
          </label>

          <label>
            Unit Number
            <input type="text" id="unit" placeholder="01-23" disabled>
          </label>
        </div>
      </div>

      <div class="total-box">
        Total: $<span id="total-price">0</span>
      </div>
    </div>

    <button id="order-btn" onclick="orderWhatsApp()">
      Order via WhatsApp
    </button>

  </div>

  <footer>
    © 2026 WAYAKI Singapore
  </footer>

  <script>
    // Cart with internal keys
    let cart = JSON.parse(localStorage.getItem("sushibakeCart")) || {};

    // Friendly display names
    const displayNames = {
      salmon: "Salmon Buddy",
      tuna: "Tuna Pop",
      egg: "Egg Pal"
    };

    // Delivery fees
    const deliveryFees = { north: 8, west: 12, south: 15 };

    // Render cart
    function renderCart() {
      const cartList = document.getElementById("cart-list");
      cartList.innerHTML = '';
      let hasItems = false;

      for (const item in cart) {
        if (cart[item].qty > 0) {
          hasItems = true;
          const li = document.createElement("li");
          li.innerHTML = `${displayNames[item]} x ${cart[item].qty} <span class="item-price">$${(cart[item].qty * cart[item].price).toFixed(2)}</span>`;
          cartList.appendChild(li);
        }
      }

      if (!hasItems) {
        cartList.innerHTML = "<li>Your cart is empty!</li>";
      }

      updateTotal();
    }

    // Toggle delivery options
    function toggleDelivery() {
      const method = document.querySelector('input[name="method"]:checked').value;

      const deliveryDiv = document.getElementById("delivery-options");
      const selfDiv = document.getElementById("self-options");

      // Show/hide sections
      deliveryDiv.style.display = method === "delivery" ? "block" : "none";
      selfDiv.style.display = method === "self" ? "block" : "none";

      // Enable/disable delivery inputs
      const deliveryInputs = deliveryDiv.querySelectorAll("input, select");
      deliveryInputs.forEach(input => input.disabled = method !== "delivery");

      updateTotal();
    }

    // Calculate total
    function calculateTotal() {
      let total = 0;
      for (const item in cart) {
        total += cart[item].qty * cart[item].price;
      }

      const method = document.querySelector('input[name="method"]:checked').value;
      if (method === "delivery") {
        const area = document.getElementById("area").value;
        if (deliveryFees[area]) total += deliveryFees[area];
      }

      return total.toFixed(2);
    }

    function updateTotal() {
      document.getElementById("total-price").textContent = calculateTotal();
    }

    // WhatsApp order
    function orderWhatsApp() {
      const nameInput = document.getElementById("name").value.trim();
      if (!nameInput) { alert("Please enter your full name."); return; }

      const phoneInput = document.getElementById("phone").value.trim();
      if (!phoneInput) { alert("Please enter your phone number."); return; }

      const method = document.querySelector('input[name="method"]:checked').value;

      // Validate cart has items
      let hasItems = false;
      for (const item in cart) {
        if (cart[item].qty > 0) { hasItems = true; break; }
      }
      if (!hasItems) { alert("Your cart is empty!"); return; }

      // Delivery fields
      let address = "";
      let postal = '';
      let unit = '';
      let area = '';

      // Self collect fields
      let pickupLocation = '';
      let pickupTime = '';

      if (method === "delivery") {
        area = document.getElementById("area").value;
        address = document.getElementById("address").value.trim();
        postal = document.getElementById("postal").value.trim();
        unit = document.getElementById("unit").value.trim();

        if (!area || !address || !postal || !unit) {
          alert("Please fill in delivery area, address, postal code, and unit number.");
          return;
        }
      } else {
        // Self collect: read location text + selected time
        pickupLocation = document.getElementById("pickup-location").innerText;

        pickupTime = document.getElementById("pickup-time").value;

        if (!pickupTime) {
          alert("Please select your preferred pick-up time.");
          return;
        }
      }

      // Build message
      let message = `Hello! My name is ${nameInput}.\n` +
                    `I'd like to order from WAYAKI Sushibake 🍣\n\n` +
                    `Order:\n`;

      for (const item in cart) {
        if (cart[item].qty > 0) {
          message += `- ${displayNames[item]} x ${cart[item].qty}\n`;
        }
      }

      message += `\nCollection Method: ${method === "self" ? "Self Collect" : "Delivery"}`;

      if (method === "self") {
        message += `\nPick-up Location: ${pickupLocation}`;
        message += `\nPreferred Pick-up Time: ${pickupTime}`;
      } else {
        message += `\nDelivery Area: ${area.charAt(0).toUpperCase() + area.slice(1)}`;
        message += `\nAddress: ${address}`;
        message += `\nPostal Code: ${postal}`;
        message += `\nUnit No: ${unit}`;
      }

      message += `\n\nContact Number: ${phoneInput}`;
      message += `\nTotal: $${calculateTotal()}`;

      const phone = "6584840768";
      const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    }

    // Load saved cart
    const savedCart = JSON.parse(localStorage.getItem("sushibakeCart")) || {};
    for (const item in savedCart) {
      if (cart[item]) cart[item].qty = savedCart[item].qty;
    }

    renderCart();
    toggleDelivery();
  </script>

</body>
</html>
