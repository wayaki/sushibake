<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WAYAKI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
  <link href="stylesheet.css" rel="stylesheet">
</head>
<body>
  <header>
    <a href="https://wayaki.github.io/sushibake/">
      <img class="logo" src="images/logo.png" alt="WAYAKI Logo">
    </a>
    
    <nav class="nav-links">
      <a href="https://wayaki.github.io/sushibake/">Menu</a>
      <a href="https://wayaki.github.io/sushibake/cart" class="linked">Cart</a>
    </nav>
  </header>

  <div class="cart-container">
    <!-- Order Details -->
    <div class="section-title">
      <h2>Order Details</h2>
    </div>
    <div class="cart-item">
      <ul id="cart-list"></ul>
    </div>

    <!-- Customer Details -->
    <div class="section-title">
        <h2>Customer Details</h2>
    </div>
    <div class="cart-item">
      <div class="checkout-section">
        <label>
          Full Name
          <input type="text" id="name" placeholder="e.g. Charlie" required>
        </label>

        <label>
          Phone Number
          <input type="tel" id="phone" placeholder="e.g. 9123 4567" required>
        </label>
      </div>
    </div>
    
    <!-- Collection Method -->
    <div class="section-title">
        <h2>Collection Method</h2>
    </div>
    <div class="cart-item">
      <div class="checkout-section">
        <!-- Self Collect -->
        <div class="collect-methods">
          <label class="radio">
            <input type="radio" name="method" value="self" checked onchange="toggleDelivery()">
            Self Collect (Free)
          </label>

          <div id="self-options" style="display:block;">
            <div class="pickup-box">
              <div class="pickup-title">Pick-up Location</div>
                <div class="pickup-value">
                  <span id="pickup-location">Woodlands, Singapore 730877</span><br>
                  <small>Exact unit number will be shared via WhatsApp after ordering.</small>
                </div>
            </div>
          </div>
        </div>

        <!-- Delivery -->
        <div class="collect-methods">
          <label class="radio">
            <input type="radio" name="method" value="delivery" onchange="toggleDelivery()">
            Delivery
          </label>
          <div id="delivery-options" style="display:none;">
            <label>
              Delivery Area
              <select id="area" onchange="updateTotal()" disabled>
                <option value="">Select area</option>
                <option value="north">North (+$8)</option>
                <option value="west">West / North East (+$12)</option>
                <option value="south">Central / East (+$15)</option>
              </select>
            </label>
            <label>
              Address
              <input type="text" id="address" placeholder="Block / Street Name" disabled>
            </label>
            <label>
              Postal Code
              <input type="text" id="postal" placeholder="e.g. 560123" disabled>
            </label>
            <label>
              Unit Number
              <input type="text" id="unit" placeholder="01-23" disabled>
            </label>
          </div>
        </div>
      </div>
    </div>
          
    <!-- Order Schedule -->
    <div class="section-title">
      <h2>Order Schedule</h2>
    </div>
    <div class="cart-item">
      <div class="checkout-section">
        <label>
          Select Order Date
          <select id="order-date" required>
            <option value="">Select a date</option>
          </select>
        </label>
        <label>
          Preferred Pick-up Time
          <select id="pickup-time">
            <option value="">Select time</option>
            <option value="12:00 - 14:00">12:00pm - 2:00pm</option>
            <option value="15:00 - 17:00">3:00pm - 5:00pm</option>
            <option  id="late-slot" value="18:00 - 20:00">6:00pm - 8:00pm (Self-Collection Only)</option>
          </select>
        </label>
      </div>
    </div>
    <div class="top-border">
      <div class="total-box">
        Total: $<span id="total-price">0</span>
        <button id="order-btn" onclick="orderWhatsApp()">
          Order via WhatsApp
        </button>
      </div>
    </div>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem("sushibakeCart")) || {};

    const itemImages = {
      salmon: "images/salmon-crabstick.png",
      tuna: "images/tuna-cucumber.png",
      chicken: "images/teriyaki-chicken.png",
      seaweed: "images/seaweed.png",
      tea: "images/tea-bag.png"
    };

    const displayNames = {
      salmon: "Salmon Deluxe",
      tuna: "Tuna Delight",
      chicken: "Chicken Comfort",
      seaweed: "Seaweed",
      tea: "Tea"
    };

    const deliveryFees = {
      north: 8,
      west: 12,
      south: 15
    };

    function getSelectedMethod() {
      return document.querySelector('input[name="method"]:checked').value;
    }

    function hasCartItems() {
      return Object.values(cart).some(item => item.qty > 0);
    }

    function getSelectedOrderDateLabel() {
      const select = document.getElementById("order-date");
      return select.options[select.selectedIndex]?.text || "";
    }

    function getFormData() {
      return {
        orderDate: getSelectedOrderDateLabel(),
        pickupTime: document.getElementById("pickup-time").value.trim(),
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        method: getSelectedMethod(),
        pickupLocation: document.getElementById("pickup-location")?.innerText.trim() || "",
        area: document.getElementById("area").value.trim(),
        address: document.getElementById("address").value.trim(),
        postal: document.getElementById("postal").value.trim(),
        unit: document.getElementById("unit").value.trim()
      };
    }

    function validateForm(data) {
      if (!hasCartItems()) {
        return "Your cart is empty!";
      }

      if (!data.name) {
        return "Please enter your full name.";
      }

      if (!data.phone) {
        return "Please enter your phone number.";
      }

      if (!data.orderDate) {
        return "Please select an order date.";
      }

      if (!data.pickupTime) {
        return "Please select a preferred time.";
      }

      if (data.method === "delivery") {
        if (!data.area) {
          return "Please select a delivery area.";
        }

        if (!data.address) {
          return "Please enter your delivery address.";
        }

        if (!data.postal) {
          return "Please enter your postal code.";
        }

        if (!/^\d{6}$/.test(data.postal)) {
          return "Please enter a valid 6-digit postal code.";
        }

        if (!data.unit) {
          return "Please enter your unit number.";
        }
      }

      return null;
    }

    function calculateSubtotal() {
      let total = 0;

      for (const item in cart) {
        total += cart[item].qty * cart[item].price;
      }

      return total;
    }

    function getDeliveryFee() {
      const method = getSelectedMethod();
      if (method !== "delivery") return 0;

      const area = document.getElementById("area").value;
      return deliveryFees[area] || 0;
    }

    function calculateTotal() {
      const subtotal = calculateSubtotal();
      const deliveryFee = getDeliveryFee();
      return (subtotal + deliveryFee).toFixed(2);
    }

    function updateTotal() {
      document.getElementById("total-price").textContent = calculateTotal();
    }

    function toggleDelivery() {
      const method = getSelectedMethod();

      const deliveryDiv = document.getElementById("delivery-options");
      const selfDiv = document.getElementById("self-options");
      const lateSlot = document.getElementById("late-slot");
      const timeSelect = document.getElementById("pickup-time");

      deliveryDiv.style.display = method === "delivery" ? "block" : "none";
      selfDiv.style.display = method === "self" ? "block" : "none";

      const deliveryInputs = deliveryDiv.querySelectorAll("input, select");
      deliveryInputs.forEach(input => {
        input.disabled = method !== "delivery";
      });

      if (lateSlot) {
        if (method === "delivery") {
          lateSlot.disabled = true;
          lateSlot.style.display = "none";

          if (timeSelect.value === lateSlot.value) {
            timeSelect.value = "";
          }
        } else {
          lateSlot.disabled = false;
          lateSlot.style.display = "block";
        }
      }

      updateTotal();
    }

    function buildOrderMessage(data) {
      let message = `Hello! My name is ${data.name}.\n`;
      message += `I'd like to order from WAYAKI Sushibake 🍣\n\n`;
      message += `Order Date: ${data.orderDate}\n`;
      message += `Preferred Time: ${data.pickupTime}\n\n`;
      message += `Order:\n`;

      for (const item in cart) {
        if (cart[item].qty > 0) {
          const qty = cart[item].qty;
          const price = cart[item].price;
          const lineTotal = (qty * price).toFixed(2);

          message += `* ${displayNames[item]} x ${qty} — $${lineTotal}\n`;
        }
      }

      message += `\nCollection Method: ${data.method === "self" ? "Self-Collect" : "Delivery"}`;

      if (data.method === "self") {
        message += `\nPick-up Location: \n ${data.pickupLocation}`;
      } else {
        const fee = deliveryFees[data.area] || 0;
        const areaLabel = data.area.charAt(0).toUpperCase() + data.area.slice(1);

        message += `\nDelivery Area: ${areaLabel}`;
        message += `\nDelivery Fee: $${fee.toFixed(2)}`;
        message += `\nAddress: ${data.address}`;
        message += `\nPostal Code: ${data.postal}`;
        message += `\nUnit No: ${data.unit}`;
      }

      message += `\n\nContact Number: ${data.phone}`;
      message += `\nTotal: $${calculateTotal()}`;

      return message;
    }

    function orderWhatsApp() {
      const data = getFormData();
      const error = validateForm(data);
    
      if (error) {
        alert(error);
        return;
      }
    
      const message = buildOrderMessage(data);
      const phone = "6584840768";
      const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`;
    
      window.open(url, "_blank");
    
      setTimeout(() => {
        localStorage.removeItem("sushibakeCart");
        cart = {};
        renderCart();
        updateTotal();
      }, 1500);
    }

    function renderCart() {
      const cartList = document.getElementById("cart-list");
      let html = "";
      let hasItems = false;

      for (const item in cart) {
        if (cart[item].qty > 0) {
          hasItems = true;

          const isMain = item === "salmon" || item === "chicken" || item === "tuna";

          html += `
            <li class="cart-block">
              <div class="cart-row">
                <img src="${itemImages[item]}" class="cart-item-img" alt="${displayNames[item]}">

                <div class="cart-item-info">
                  <div class="cart-item-name">${displayNames[item]}</div>
                  <div class="cart-item-qty">x ${cart[item].qty}</div>
                </div>

                <div class="cart-item-price">
                  $${(cart[item].qty * cart[item].price).toFixed(2)}
                </div>
              </div>

              ${
                isMain
                  ? `<div class="free-seaweed-line">🎁 Free ${cart[item].qty} seaweed</div>`
                  : ``
              }
            </li>
          `;
        }
      }

      if (!hasItems) {
        html = "<li>Your cart is empty!</li>";
      }

      cartList.innerHTML = html;
      updateTotal();
    }

    function formatDateValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDateLabel(date) {
      const options = {
        weekday: "long",
        day: "numeric",
        month: "short"
      };
      return date.toLocaleDateString("en-SG", options);
    }

    function getCutoffDate(orderDate) {
      const cutoff = new Date(orderDate);
      const day = orderDate.getDay(); // Wed = 3, Sat = 6

      if (day === 3) {
        cutoff.setDate(orderDate.getDate() - 2); // Monday
      } else if (day === 6) {
        cutoff.setDate(orderDate.getDate() - 2); // Thursday
      }

      cutoff.setHours(21, 0, 0, 0);
      return cutoff;
    }

    function populateAprilOrderDates() {
      const select = document.getElementById("order-date");
      const now = new Date();

      select.innerHTML = `<option value="">Select a date</option>`;

      const year = 2026; // fixed to April 2026
      const aprilMonthIndex = 3;

      for (let day = 1; day <= 30; day++) {
        const date = new Date(year, aprilMonthIndex, day);
        const dayOfWeek = date.getDay();

        if (dayOfWeek === 3 || dayOfWeek === 6) {
          const cutoff = getCutoffDate(date);

          if (now <= cutoff) {
            const option = document.createElement("option");
            option.value = formatDateValue(date);
            option.textContent = formatDateLabel(date);
            select.appendChild(option);
          }
        }
      }
    }

    const savedCart = JSON.parse(localStorage.getItem("sushibakeCart")) || {};
    for (const item in savedCart) {
      if (cart[item]) {
        cart[item].qty = savedCart[item].qty;
      }
    }

    populateAprilOrderDates();
    renderCart();
    toggleDelivery();
  </script>
</body>
</html>
