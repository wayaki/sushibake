<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WAYAKI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/product.css">

</head>

<body>

  <div class="product-container">

    <button
      type="button"
      class="close-btn"
      onclick="closeProductPage()"
    >
      ✕
    </button>

    <img id="product-image" class="product-image">

    <div class="product-name" id="product-name"></div>

    <div class="product-desc" id="product-desc"></div>

    <div class="price-row">
      <span id="product-price" class="product-price"></span>
      <span id="original-price" class="original-price"></span>
    </div>

    <div class="section" id="flavour-section" style="display: none;">
      <h3>Choose 3 Different Flavours</h3>
      <div id="flavour-options"></div>
    </div>
    
    <!-- Remove Ingredients -->
    <div class="section">
      <h3>Remove Ingredients</h3>

      <div id="remove-options"></div>
    </div>

    <!-- Rice Options -->
    <div class="section">
      <h3>Rice Preference</h3>

      <div id="rice-options"></div>
    </div>

    <!-- Upgrade Options -->
    <div class="section" style="display:none;">
      <h3>Included</h3>
      <div id="include-options"></div>
    </div>

    <!-- Instructions -->
    <div class="section">
      <h3>Special Instructions</h3>

      <textarea id="instructions" placeholder="Anything we should know?"></textarea>
    </div>

    <!-- Quantity -->
    <div class="section">
      <h3>Quantity</h3>

      <div class="qty-wrapper">
        <button class="qty-btn" onclick="changeQty(-1)">-</button>

        <span class="qty-number" id="qty">1</span>

        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">

    <button
      id="cart-action-btn"
      class="add-cart-btn"
      onclick="addToCart()"
    >
      Add To Cart — <span id="final-price">$0.00</span>
    </button>

  </div>

  <!-- JavaScript -->
  <!-- PRODUCTS -->
  <script src="js/products.js"></script>
  <!-- PRODUCT -->
  <script src="js/product.js"></script>

</body>
</html>
